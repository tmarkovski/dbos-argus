[project]
name = "argus-sample-app"
version = "0.0.1"
description = "Sample DBOS Transact app — dev fixture for the Argus dashboard."
requires-python = ">=3.12"
dependencies = [
  "dbos>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
include = ["main.py"]

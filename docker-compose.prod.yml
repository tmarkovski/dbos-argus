# Run Argus from the published Docker Hub image.
#
# Quick start (brings up Postgres + Argus):
#   docker compose -f docker-compose.prod.yml up
#
# Pin a version:
#   ARGUS_IMAGE_TAG=v0.1.0 docker compose -f docker-compose.prod.yml up
#
# Point at an external Postgres (skip the bundled one):
#   ARGUS_DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/db \
#     docker compose -f docker-compose.prod.yml up argus

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - argus-pg-data:/var/lib/postgresql/data

  argus:
    image: tmarkovski/dbos-argus:${ARGUS_IMAGE_TAG:-edge}
    environment:
      ARGUS_DATABASE_URL: ${ARGUS_DATABASE_URL:-postgresql+asyncpg://argus:argus@postgres:5432/argus}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  argus-pg-data:

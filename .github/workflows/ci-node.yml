name: ci-node

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/ci-node.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/ci-node.yml"
  workflow_dispatch:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm exec turbo run lint --filter='!@dbos-argus/server'

      - name: Test
        run: pnpm exec turbo run test --filter='!@dbos-argus/server'

      - name: Build
        run: pnpm exec turbo run build --filter='!@dbos-argus/server'

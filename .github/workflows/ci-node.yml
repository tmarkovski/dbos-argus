name: ci-node

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-node.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-node.yml"
  workflow_dispatch:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm -r run lint

      - name: Test
        run: pnpm -r run test

      - name: Build
        run: pnpm -r run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

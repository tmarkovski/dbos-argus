name: release

# Triggered by pushing a v* tag. Three sequenced jobs:
#   1. pypi    — build wheel/sdist and publish via OIDC trusted publishing
#   2. docker  — pull from PyPI into a slim image, push multi-arch to Docker Hub
#   3. release — create the matching GitHub Release with auto-generated notes
#
# Docker depends on PyPI so the `pip install dbos-argus==<ver>` in the image
# can never race against the upload. Release depends on both — it only fires
# once both artifacts are live.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write   # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # hatch-vcs reads tags

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install uv
        # setup-uv stopped publishing major-version tags (no `@v8`) for
        # supply-chain reasons — see release notes for v8.0.0.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install pnpm workspace
        run: pnpm install --frozen-lockfile

      - name: Build wheel + sdist
        run: bash scripts/build-pypi.sh

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*

  # Build amd64 and arm64 images in parallel on *native* runners, push each by
  # digest only (no tags), then assemble the multi-arch manifest in `docker-manifest`.
  # Building arm64 under QEMU on an amd64 runner was the dominant cost — pip
  # install of dbos-argus took ~10s natively but ~95s emulated. With native
  # arm64 runners the per-arch jobs run side-by-side instead of sequentially.
  docker-build:
    needs: [pypi]
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch_suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch_suffix: arm64
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: tmarkovski
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          # Push by digest only; `docker-manifest` job assembles the tagged
          # multi-arch manifest from these digests.
          outputs: type=image,name=tmarkovski/dbos-argus,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            ARGUS_VERSION=${{ steps.ver.outputs.version }}
          # Per-arch GHA cache scope so amd64 and arm64 don't fight over the
          # same key on subsequent runs.
          cache-from: type=gha,scope=docker-${{ matrix.arch_suffix }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch_suffix }}

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch_suffix }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    needs: [docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: tmarkovski
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: tmarkovski/dbos-argus
          # `latest` is suppressed for prereleases (rc/a/b suffixes) so
          # `:latest` always points at a stable release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') }}

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'tmarkovski/dbos-argus@sha256:%s ' *)

      - name: Inspect resulting image
        run: |
          docker buildx imagetools inspect tmarkovski/dbos-argus:${{ needs.docker-build.outputs.version }}

  release:
    needs: [pypi, docker-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If CHANGELOG.md has a section for this tag, use that as the body.
          # Otherwise fall back to GitHub's auto-generated commit/PR list.
          version="${GITHUB_REF_NAME#v}"
          notes_file="$(mktemp)"
          if [ -f CHANGELOG.md ] && awk -v v="$version" '
              /^## \[/ {
                if (capturing) exit
                if ($0 ~ "\\[" v "\\]") capturing=1; next
              }
              capturing { print }
            ' CHANGELOG.md > "$notes_file" && [ -s "$notes_file" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$notes_file" \
              --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi

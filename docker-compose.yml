# Postgres + Argus, both pulled as published images.
#
# Quick start:
#   docker compose up
#
# Pin a specific Argus version (matches the Docker Hub tag — no leading "v"):
#   ARGUS_IMAGE_TAG=0.1.0 docker compose up
#
# Point at an existing Postgres instead of the bundled one:
#   ARGUS_DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/db \
#     docker compose up argus

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - argus-pg-data:/var/lib/postgresql/data

  argus:
    image: tmarkovski/dbos-argus:${ARGUS_IMAGE_TAG:-latest}
    environment:
      ARGUS_DATABASE_URL: ${ARGUS_DATABASE_URL:-postgresql+asyncpg://argus:argus@postgres:5432/argus}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  argus-pg-data:

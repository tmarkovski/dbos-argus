services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - argus-pg-data:/var/lib/postgresql/data

  argus:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ARGUS_DATABASE_URL: postgresql+asyncpg://argus:argus@postgres:5432/argus
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  argus-pg-data:
